<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>こぼすな一杯</title>
  <meta name="description" content="喫茶店の日ミニゲーム。コーヒーを表面張力ギリギリまで注いで止めろ。" />
  <link rel="stylesheet" href="/apps/2026-04-13/style.css" />
</head>
<body>
  <main class="app">
    <header class="hud">
      <div class="brand">
        <div class="brand__sub">4/13 喫茶店の日</div>
        <h1 class="brand__title">こぼすな一杯</h1>
      </div>
      <div class="meters">
        <div class="meter-card">
          <span class="meter-card__label">残り時間</span>
          <span class="meter-card__value" id="timeText">15.0</span>
        </div>
        <div class="meter-card">
          <span class="meter-card__label">評価</span>
          <span class="meter-card__value" id="rankText">-</span>
        </div>
      </div>
    </header>

    <section class="stage">
      <div class="counter"></div>
      <div class="steam steam--1"></div>
      <div class="steam steam--2"></div>
      <div class="steam steam--3"></div>

      <div class="machine">
        <div class="machine__head"></div>
        <div class="spout"></div>
        <div class="stream" id="stream"></div>
      </div>

      <div class="cup-area">
        <div class="cup-wrap">
          <div class="danger-line" id="dangerLine"></div>
          <div class="coffee" id="coffee"></div>
          <div class="foam" id="foam"></div>
          <div class="surface" id="surface"></div>
          <div class="spill" id="spill"></div>
          <div class="cup">
            <div class="cup__handle"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="target">
        <div class="target__label">狙い目</div>
        <div class="target__bar">
          <div class="target__safe"></div>
          <div class="target__perfect"></div>
        </div>
        <div class="target__note">赤線ギリギリが高評価。越えるとアウト。</div>
      </div>

      <p class="message" id="message">
        長押しで注ぐ。離すと止まる。表面張力ギリギリで止めろ。
      </p>

      <div class="controls">
        <button class="pour-btn" id="pourBtn" type="button">長押しで注ぐ</button>
        <button class="secondary-btn" id="restartBtn" type="button">やり直す</button>
      </div>
    </section>

    <section class="result hidden" id="result">
      <div class="result__card">
        <div class="result__sub">RESULT</div>
        <div class="result__rank" id="resultRank">名バリスタ</div>
        <div class="result__score" id="resultScore">95%</div>
        <p class="result__text" id="resultText"></p>
        <button class="secondary-btn secondary-btn--large" id="retryBtn" type="button">もう一杯いく</button>
      </div>
    </section>
  </main>

  <script type="module" src="/apps/2026-04-13/main.js"></script>
</body>
</html>
