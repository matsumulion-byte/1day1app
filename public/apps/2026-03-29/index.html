<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
  />
  <title>マリモゲーム</title>
  <link rel="stylesheet" href="/apps/2026-03-29/style.css" />
</head>
<body>
  <main class="app">
    <header class="hud">
      <div class="title-wrap">
        <h1 class="title">マリモゲーム</h1>
        <p class="subtitle">くっつけて育てろ</p>
      </div>

      <div class="score-wrap">
        <div class="score-label">SCORE</div>
        <div id="score" class="score-value">0</div>
      </div>
    </header>

    <section class="game-shell">
      <div id="gameoverLine" class="gameover-line"></div>
      <div id="world" class="world"></div>

      <div class="next-panel">
        <div class="next-label">NEXT</div>
        <canvas id="nextCanvas" width="84" height="84"></canvas>
      </div>

      <div id="centerGuide" class="center-guide"></div>

      <div id="overlay" class="overlay show">
        <div class="overlay-card">
          <h2>マリモ合成槽</h2>
          <p>
            同じサイズのマリモがぶつかると合体。<br />
            水槽がいっぱいになるとゲームオーバー。
          </p>
          <button id="startBtn" class="primary-btn">START</button>
        </div>
      </div>

      <div id="gameoverPanel" class="overlay hidden">
        <div class="overlay-card">
          <h2>GAME OVER</h2>
          <p id="finalScoreText">SCORE: 0</p>
          <button id="retryBtn" class="primary-btn">RETRY</button>
        </div>
      </div>
    </section>

    <div class="controls">
      <button id="leftBtn" class="ctrl-btn" aria-label="左">◀</button>
      <button id="dropBtn" class="ctrl-btn drop" aria-label="落とす">DROP</button>
      <button id="rightBtn" class="ctrl-btn" aria-label="右">▶</button>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
  <script type="module" src="/apps/2026-03-29/main.js"></script>
</body>
</html>
