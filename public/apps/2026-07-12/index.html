<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#061916" />
  <title>地球受信機 — ON AIR, SOMEWHERE</title>
  <link rel="stylesheet" href="/apps/2026-07-12/styles-v2.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">7.12 RADIO DAY</p>
        <h1>地球受信機</h1>
      </div>
      <button id="soundButton" class="icon-button" type="button" aria-label="音量を切り替える">VOL</button>
    </header>

    <section class="receiver" aria-label="ラジオ受信機">
      <div class="status-row">
        <span id="liveLamp" class="live-lamp"></span>
        <span id="statusText">READY TO TUNE</span>
        <span id="roundText">00</span>
      </div>

      <div class="frequency-window">
        <div class="scan-lines"></div>
        <p id="frequency" class="frequency">---.--</p>
        <p id="bandLabel" class="band-label">WORLD WIDE BAND</p>
        <div class="meter"><span id="meterFill"></span></div>
      </div>

      <div class="visualizer" id="visualizer" aria-hidden="true"></div>

      <div class="message-panel">
        <p id="message" class="message">ダイヤルを回して、世界のどこかへ。</p>
        <p id="subMessage" class="sub-message">局名も国名も、まだ秘密です。</p>
      </div>

      <div class="controls">
        <button id="tuneButton" class="tune-button" type="button">
          <span class="dial-ring"><span class="dial-mark"></span></span>
          <strong>受信する</strong>
        </button>
        <button id="skipButton" class="small-button" type="button" disabled>別の電波</button>
      </div>
    </section>

    <section id="guessPanel" class="guess-panel" hidden>
      <div class="guess-head">
        <div>
          <p class="eyebrow">WHERE IS THIS?</p>
          <h2>どこからの放送？</h2>
        </div>
        <span id="timer" class="timer">30</span>
      </div>
      <div id="countryGrid" class="country-grid"></div>
      <button id="revealButton" class="reveal-button" type="button">降参して答えを見る</button>
    </section>

    <section id="resultPanel" class="result-panel" hidden>
      <p id="resultKicker" class="eyebrow">SIGNAL FOUND</p>
      <div class="result-country">
        <span id="flag" class="flag">🌍</span>
        <div>
          <h2 id="countryName">UNKNOWN</h2>
          <p id="stationLocation"></p>
        </div>
      </div>
      <div class="station-card">
        <span>NOW ON AIR</span>
        <strong id="stationName">—</strong>
        <small id="stationTags">LIVE RADIO</small>
      </div>
      <p id="resultMessage" class="result-message"></p>
      <div class="result-actions">
        <a id="stationLink" class="station-link" href="#" target="_blank" rel="noopener noreferrer">局のサイト</a>
        <button id="nextButton" class="next-button" type="button">次の国を受信</button>
      </div>
    </section>

    <footer>
      <span>ON AIR, SOMEWHERE</span>
      <span id="collection">受信国 0</span>
    </footer>

    <audio id="radio" playsinline></audio>
  </main>
  <script src="/apps/2026-07-12/script-v7.js"></script>
</body>
</html>
