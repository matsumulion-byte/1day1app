<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>指先ローラーコースター</title>
  <link rel="stylesheet" href="/apps/2026-07-09/styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="day">7月9日 ジェットコースターの日</p>
        <h1>指先ローラーコースター</h1>
      </div>
      <div class="scoreboard" aria-label="コース情報">
        <div>
          <span>距離</span>
          <strong id="lengthValue">0m</strong>
        </div>
        <div>
          <span>落差</span>
          <strong id="dropValue">0m</strong>
        </div>
        <div>
          <span>判定</span>
          <strong id="ratingValue">待機中</strong>
        </div>
      </div>
    </header>

    <section class="stageWrap" aria-label="コース作成エリア">
      <canvas id="coasterCanvas"></canvas>
      <div id="hint" class="hint">指でレールを一筆書き</div>
      <div id="resultCard" class="resultCard" aria-live="polite">
        <p id="resultLabel" class="resultLabel">コース判定</p>
        <strong id="resultGrade">?</strong>
        <span id="resultTitle">判定待ち</span>
        <p id="resultComment">発車すると判定が出ます。</p>
      </div>
    </section>

    <footer class="controls">
      <button id="runButton" class="primary" type="button">発車</button>
      <button id="undoButton" type="button" aria-label="一つ戻す">戻す</button>
      <button id="clearButton" type="button" aria-label="消す">消す</button>
      <label class="speed">
        <span>速度</span>
        <input id="speedInput" type="range" min="0.6" max="2.2" step="0.1" value="1.2" />
      </label>
    </footer>

    <section id="judgeModal" class="judgeModal" aria-hidden="true" aria-labelledby="judgeTitle" role="dialog">
      <div class="judgePanel">
        <p id="judgeLabel" class="judgeLabel">完走判定</p>
        <button id="judgeClose" class="judgeClose" type="button" aria-label="判定を閉じる">×</button>
        <div class="judgeHero">
          <strong id="judgeGrade">S</strong>
          <div>
            <h2 id="judgeTitle">絶叫設計士</h2>
            <p id="judgeScore">92点</p>
          </div>
        </div>
        <p id="judgeComment" class="judgeComment">落差、曲線、勢いがそろった名物コース。行列ができます。</p>
        <dl class="judgeStats">
          <div>
            <dt>距離</dt>
            <dd id="judgeLength">0m</dd>
          </div>
          <div>
            <dt>落差</dt>
            <dd id="judgeDrop">0m</dd>
          </div>
          <div>
            <dt>カーブ</dt>
            <dd id="judgeTurns">0</dd>
          </div>
          <div>
            <dt>ループ</dt>
            <dd id="judgeLoops">なし</dd>
          </div>
        </dl>
        <p id="judgeTip" class="judgeTip">次はもっと高い山を描くとスコアが伸びます。</p>
        <button id="judgeRetry" class="judgeRetry" type="button">もう一度つくる</button>
      </div>
    </section>
  </main>

  <script src="/apps/2026-07-09/script-v4.js"></script>
</body>
</html>
