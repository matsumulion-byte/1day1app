<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>WIG DAY</title>
  <style>
    :root {
      --bg: #111;
      --panel: rgba(255,255,255,.12);
      --panel-border: rgba(255,255,255,.18);
      --text: #fff;
      --accent: #ffd54f;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      overflow: hidden;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100dvh;
      background: #000;
    }

    video,
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    video {
      transform: scaleX(-1);
      opacity: 0;
      pointer-events: none;
    }

    canvas {
      z-index: 2;
    }

    .topbar {
      position: absolute;
      top: env(safe-area-inset-top, 0);
      left: 0;
      right: 0;
      z-index: 3;
      padding: 12px 14px 0;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .score {
      pointer-events: auto;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.45);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(8px);
      font-size: 13px;
      font-weight: 700;
    }

    .controls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: calc(env(safe-area-inset-bottom, 0) + 14px);
      z-index: 3;
      padding: 0 14px;
      display: grid;
      gap: 10px;
    }

    .wig-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    button {
      appearance: none;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 10px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      backdrop-filter: blur(10px);
    }

    button.active {
      border-color: rgba(255,213,79,.9);
      box-shadow: 0 0 0 1px rgba(255,213,79,.35) inset;
      color: var(--accent);
    }

    .main-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    #startOverlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: grid;
      place-items: center;
      background:
        linear-gradient(to bottom, rgba(0,0,0,.45), rgba(0,0,0,.72));
      padding: 24px;
      text-align: center;
    }

    .start-card {
      width: min(92vw, 420px);
      padding: 24px 18px;
      border-radius: 24px;
      background: rgba(17,17,17,.78);
      border: 1px solid rgba(255,255,255,.14);
      backdrop-filter: blur(12px);
    }

    .start-card h1 {
      margin: 0 0 10px;
      font-size: 26px;
      line-height: 1.1;
    }

    .start-card p {
      margin: 0 0 16px;
      font-size: 14px;
      line-height: 1.6;
      color: rgba(255,255,255,.82);
    }

    #startBtn {
      width: 100%;
      padding: 14px 16px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 14px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div class="app">
    <video id="video" playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div class="topbar">
      <div class="score" id="score">似合ってる度: --</div>
    </div>

    <div class="controls">
      <div class="wig-row">
        <button class="wig-btn active" data-wig="bob">ボブ</button>
        <button class="wig-btn" data-wig="long">巻き髪</button>
        <button class="wig-btn" data-wig="afro">アフロ</button>
      </div>
      <div class="main-actions">
        <button id="flipBtn">内カメ / 外カメ</button>
        <button id="saveBtn">保存</button>
      </div>
    </div>

    <div id="startOverlay">
      <div class="start-card">
        <h1>WIG DAY</h1>
        <p>顔を認識してウィッグを被せます。<br>最初にカメラを許可してください。</p>
        <button id="startBtn">スタート</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script type="module" src="/apps/2026-03-19/main.js"></script>
</body>
</html>
