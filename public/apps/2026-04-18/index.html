<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>BPMチェッカー</title>
  <style>
    :root {
      --bg: #111;
      --panel: #1c1c1c;
      --line: #2b2b2b;
      --text: #f5f5f5;
      --sub: #bdbdbd;
      --accent: #ffffff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      min-height: 100%;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px 16px;
    }

    .app {
      width: 100%;
      max-width: 560px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 24px 18px 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,.25);
    }

    .title {
      margin: 0 0 20px;
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: .04em;
    }

    .picker {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }

    .file-label {
      display: grid;
      place-items: center;
      min-height: 56px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #252525;
      cursor: pointer;
      text-align: center;
      font-weight: 600;
    }

    .file-label:hover {
      background: #2a2a2a;
    }

    input[type="file"] {
      display: none;
    }

    .filename {
      text-align: center;
      color: var(--sub);
      font-size: 14px;
      min-height: 20px;
    }

    .status {
      min-height: 24px;
      text-align: center;
      color: var(--sub);
      font-size: 14px;
      margin-bottom: 20px;
    }

    .result {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px 16px;
      text-align: center;
      min-height: 240px;
      display: grid;
      place-items: center;
      background: #171717;
    }

    .placeholder {
      color: var(--sub);
      line-height: 1.8;
      font-size: 15px;
    }

    .bpm {
      font-size: clamp(48px, 12vw, 88px);
      font-weight: 800;
      letter-spacing: .02em;
      line-height: 1;
      margin: 0 0 14px;
    }

    .tempo {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 10px;
    }

    .feel {
      font-size: 22px;
      font-weight: 600;
      color: var(--sub);
      margin: 0;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      justify-content: center;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      background: #252525;
      color: var(--text);
      border-radius: 999px;
      min-height: 46px;
      padding: 0 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #2c2c2c;
    }

    button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .note {
      margin-top: 14px;
      text-align: center;
      color: #8f8f8f;
      font-size: 12px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1 class="title">BPMチェッカー</h1>

    <section class="picker">
      <label class="file-label" for="audioFile">音源を選択</label>
      <input
        id="audioFile"
        type="file"
        accept="audio/*,.mp3,.wav,.m4a,.aac,.ogg"
      />
      <div id="filename" class="filename"></div>
    </section>

    <div id="status" class="status"></div>

    <section id="result" class="result">
      <div class="placeholder">
        音源をアップすると<br />
        BPMを推定します
      </div>
    </section>

    <div class="actions">
      <button id="resetBtn" type="button" disabled>リセット</button>
    </div>

    <p class="note">
      推定値です。Swing / Straight は簡易判定です。
    </p>
  </main>

  <script type="module" src="/apps/2026-04-18/main.js"></script>
</body>
</html>
