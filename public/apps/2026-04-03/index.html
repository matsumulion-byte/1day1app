<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>趣味診断</title>
    <link rel="stylesheet" href="/2026-04-03/style.css" />
  </head>
  <body>
    <main class="app">
      <section class="card" id="startScreen">
        <p class="eyebrow">4/3 趣味の日</p>
        <h1>あなたに向いてる<br />趣味診断</h1>
        <p class="lead">
          3つの質問に答えると、<br />
          あなたに向いている趣味がわかります。
        </p>
        <button class="primary-btn" id="startBtn">診断する</button>
      </section>

      <section class="card hidden" id="questionScreen">
        <div class="progress-wrap">
          <p class="progress-text" id="progressText">Q1 / 3</p>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <h2 class="question" id="questionText"></h2>

        <div class="choices">
          <button class="choice-btn" id="choiceA"></button>
          <button class="choice-btn" id="choiceB"></button>
        </div>
      </section>

      <section class="card hidden" id="resultScreen">
        <p class="eyebrow">診断結果</p>
        <p class="result-label">あなたに向いてる趣味は</p>
        <h2 class="result-title" id="resultTitle"></h2>
        <p class="result-desc" id="resultDesc"></p>

        <div class="step-box">
          <p class="step-label">最初の一歩</p>
          <p class="step-text" id="resultStep"></p>
        </div>

        <div class="result-actions">
          <button class="secondary-btn" id="retryBtn">もう一度診断</button>
          <button class="primary-btn" id="shareBtn">結果をコピー</button>
        </div>
      </section>
    </main>

    <script type="module" src="/2026-04-03/main.js"></script>
  </body>
</html>
