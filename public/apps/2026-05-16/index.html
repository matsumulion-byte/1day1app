<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>生きろ！人形</title>
  <link rel="stylesheet" href="/apps/2026-05-16/style.css" />
</head>
<body>
  <main class="app">
    <section class="intro">
      <p class="date">5/16 Jim Henson Memorial</p>
      <h1>生きろ！人形</h1>
      <p class="lead">ドラッグでゆらす。タップでしゃべる。ただそれだけ。</p>
    </section>

    <section class="stage" id="stage" aria-label="人形の舞台">
      <div class="curtain curtain-left"></div>
      <div class="curtain curtain-right"></div>

      <div class="spotlight"></div>

      <div class="puppet-wrap" id="puppet">
        <div class="puppet-shadow"></div>

        <div class="puppet-body">
          <div class="arm arm-left" id="leftArm"></div>
          <div class="arm arm-right" id="rightArm"></div>

          <div class="torso"></div>

          <div class="head" id="head">
            <div class="ear ear-left"></div>
            <div class="ear ear-right"></div>

            <div class="hair hair-1"></div>
            <div class="hair hair-2"></div>
            <div class="hair hair-3"></div>

            <div class="eye eye-left">
              <div class="pupil"></div>
            </div>
            <div class="eye eye-right">
              <div class="pupil"></div>
            </div>

            <div class="nose"></div>

            <div class="mouth" id="mouth">
              <div class="mouth-inner"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="hand-area">
        <div class="operator-hand"></div>
      </div>
    </section>

    <section class="controls">
      <button type="button" id="poseWave">手を振る</button>
      <button type="button" id="poseNod">うなずく</button>
      <button type="button" id="poseReset">ぬいぐるみに戻る</button>
    </section>
  </main>

  <script type="module" src="/apps/2026-05-16/main.js"></script>
</body>
</html>
