<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>部屋の重力スイッチ</title>
    <link rel="stylesheet" href="/apps/2026-06-16/styles.css" />
  </head>
  <body>
    <main class="app" aria-label="部屋の重力スイッチ">
      <header class="topbar">
        <div>
          <p class="date">6/16 無重力の日</p>
          <h1>部屋の重力スイッチ</h1>
        </div>
        <div class="readout" aria-live="polite">
          <span id="modeText">GRAVITY ON</span>
          <strong id="gravityValue">1.00G</strong>
        </div>
      </header>

      <section class="room-shell">
        <canvas id="roomCanvas" aria-label="無重力になる部屋のシミュレーター"></canvas>
        <div class="room-overlay" aria-hidden="true">
          <span class="window"></span>
          <span class="poster"></span>
          <span class="lamp"></span>
        </div>
      </section>

      <section class="controls" aria-label="操作">
        <button id="gravityButton" type="button" aria-pressed="false">
          <span id="buttonIcon">↓</span>
          <strong id="buttonLabel">重力を切る</strong>
        </button>
        <button id="shuffleButton" type="button">そっと押す</button>
        <button id="resetButton" type="button">片付ける</button>
      </section>
    </main>

    <script src="/apps/2026-06-16/script.js"></script>
  </body>
</html>
