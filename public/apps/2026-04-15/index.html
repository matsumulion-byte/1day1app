<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>ヘリ着陸ゲーム</title>
    <link rel="stylesheet" href="/apps/2026-04-15/style.css" />
  </head>
  <body>
    <main class="app">
      <header class="hud">
        <div class="hud__left">
          <p class="hud__label">HELI LANDING</p>
          <p class="hud__title">ヘリ着陸チャレンジ</p>
        </div>
        <div class="hud__right">
          <div class="meter">
            <span class="meter__label">FUEL</span>
            <div class="meter__bar">
              <div id="fuelBar" class="meter__fill"></div>
            </div>
          </div>
        </div>
      </header>

      <section class="game-wrap">
        <canvas id="gameCanvas" width="390" height="740" aria-label="ヘリ着陸ゲーム"></canvas>

        <div id="centerGuide" class="center-guide">長押しで上昇</div>

        <div id="resultOverlay" class="overlay is-hidden">
          <div class="overlay__card">
            <p id="resultBadge" class="overlay__badge">SUCCESS</p>
            <h1 id="resultTitle" class="overlay__title">着陸成功！</h1>
            <p id="resultText" class="overlay__text"></p>
            <button id="retryBtn" class="overlay__button" type="button">もう一回</button>
          </div>
        </div>
      </section>

      <footer class="controls">
        <button id="startBtn" class="start-button" type="button">START</button>
        <p class="controls__note">
          画面を長押し、またはスペースキー長押しで上昇。着陸帯にそっと降ろせ。
        </p>
      </footer>
    </main>

    <script type="module" src="/apps/2026-04-15/main.js"></script>
  </body>
</html>
