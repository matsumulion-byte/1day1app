<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>芝刈りスネーク</title>
    <link rel="stylesheet" href="/apps/2026-04-08/style.css" />
  </head>
  <body>
    <div class="app">
      <header class="hud">
        <div class="hud__left">
          <h1>芝刈りスネーク</h1>
          <p class="sub">刈った場所は通れない。どこまで刈れる？</p>
        </div>
        <div class="hud__right">
          <div class="stat">
            <span class="label">刈り率</span>
            <span id="percent" class="value">0%</span>
          </div>
          <div class="stat">
            <span class="label">スピード</span>
            <span id="speed" class="value">1.0x</span>
          </div>
        </div>
      </header>

      <main class="stage-wrap">
        <canvas id="game" width="720" height="720" aria-label="芝刈りゲーム"></canvas>

        <div id="overlay" class="overlay show">
          <div class="panel">
            <h2>芝刈りスネーク</h2>
            <p>
              矢印キー / WASD / 下のボタンで移動。<br />
              通ったマスは刈られて通れません。<br />
              時間が経つほどスピードアップします。
            </p>
            <button id="startBtn" class="btn">スタート</button>
          </div>
        </div>
      </main>

      <section class="controls">
        <div class="pad">
          <button class="ctrl up" data-dir="up" aria-label="上">▲</button>
          <button class="ctrl left" data-dir="left" aria-label="左">◀</button>
          <button class="ctrl down" data-dir="down" aria-label="下">▼</button>
          <button class="ctrl right" data-dir="right" aria-label="右">▶</button>
        </div>
      </section>
    </div>

    <script type="module" src="/apps/2026-04-08/main.js"></script>
  </body>
</html>
