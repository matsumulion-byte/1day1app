<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>湯加減チキンレース</title>
  <link rel="stylesheet" href="/apps/2026-04-26/style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="date">4/26 よい風呂の日</p>
      <h1>湯加減<br />チキンレース</h1>
      <p class="lead">42.0℃ギリギリで止めろ。</p>
    </section>

    <section class="bathArea">
      <div class="steam steam1"></div>
      <div class="steam steam2"></div>
      <div class="steam steam3"></div>

      <div class="meter">
        <div class="meterTop">
          <span>湯温</span>
          <strong id="tempText">36.0℃</strong>
        </div>
        <div class="bar">
          <div id="barFill" class="barFill"></div>
          <div class="targetLine"></div>
        </div>
        <div class="scale">
          <span>36℃</span>
          <span>42℃</span>
          <span>45℃</span>
        </div>
      </div>

      <div class="bath">
        <img id="matsumura" class="matsumura" alt="風呂に入る松村" />
        <div class="water"></div>
      </div>
    </section>

    <section class="controls">
      <button id="startBtn" class="mainBtn">START</button>
      <button id="stopBtn" class="stopBtn" disabled>STOP</button>
      <button id="retryBtn" class="subBtn hidden">もう一回</button>
    </section>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modalCard">
      <p id="resultTemp" class="resultTemp">42.0℃</p>
      <h2 id="resultTitle">神の湯加減</h2>
      <p id="resultText">これはもう温泉ソムリエ松村。</p>
      <button id="closeModal" class="mainBtn">閉じる</button>
    </div>
  </div>

  <audio id="bgm" loop></audio>
  <script type="module" src="/apps/2026-04-26/main.js"></script>
</body>
</html>
