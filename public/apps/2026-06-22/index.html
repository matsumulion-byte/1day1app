<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#68c8d0">
  <meta name="description" content="砂浜から飛び出すカニを叩く、カニの日アクションゲーム。">
  <title>カニカニパニック</title>
  <link rel="stylesheet" href="/apps/2026-06-22/styles.css">
</head>
<body>
  <main class="app">
    <header>
      <div>
        <p class="date">6.22 / CRAB DAY</p>
        <h1>カニカニ<br><span>パニック</span></h1>
      </div>
      <button id="soundButton" class="sound" type="button" aria-label="サウンド切替">♪</button>
    </header>

    <section class="game-shell">
      <div class="hud">
        <div><span>のこり</span><strong id="timeValue">30</strong><small>秒</small></div>
        <div class="goal"><span>スコア</span><strong id="scoreValue">0</strong><i>点</i></div>
        <div class="combo"><span>コンボ</span><strong id="comboValue">0</strong></div>
      </div>
      <canvas id="game" width="390" height="620" aria-label="穴から出るカニをタップするゲーム"></canvas>

      <section id="startScreen" class="overlay">
        <div class="card">
          <div class="crab-mark" aria-hidden="true"><i></i><b>!</b><i></i></div>
          <p class="label">HOW TO PANIC</p>
          <h2>出たカニ、<br>すばやくタップ。</h2>
          <div class="howto"><span>🦀</span><b>カニを直接タップ</b><span>☝</span></div>
          <p>赤いカニは10点、金は30点。<br>ヤドカリを叩くとコンボが切れる。</p>
          <button id="startButton" class="primary" type="button">パニック開始</button>
        </div>
      </section>

      <section id="resultScreen" class="overlay hidden">
        <div class="card result">
          <p id="resultLabel" class="label">MISSION COMPLETE</p>
          <div id="resultCrab" class="result-crab">🦀</div>
          <h2 id="resultTitle">カニの日、<br>完全勝利。</h2>
          <p id="resultText">0点</p>
          <button id="retryButton" class="primary" type="button">もう一度たたく</button>
        </div>
      </section>
    </section>
    <footer><span>カ = 6</span><span>ニ = 22</span><span>TAP THE CRAB</span></footer>
  </main>
  <script src="/apps/2026-06-22/script.js"></script>
</body>
</html>
