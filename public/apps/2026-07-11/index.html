<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0c0b12" />
  <title>レシモン｜その買い物、召喚します。</title>
  <link rel="stylesheet" href="/apps/2026-07-11/styles.css" />
</head>
<body>
  <main class="app">
    <header>
      <div class="date">07.11 <span>CONVENIENCE STORE DAY</span></div>
      <h1>レシ<span>モン</span></h1>
      <p>その買い物、召喚します。</p>
    </header>

    <section id="scanScreen" class="screen active">
      <div class="scanner">
        <input id="receiptInput" type="file" accept="image/*" capture="environment" />
        <label for="receiptInput" class="cameraArea">
          <img id="preview" alt="レシートのプレビュー" />
          <div id="cameraPrompt" class="cameraPrompt"><b>＋</b><span>レシートを撮影</span><small>店名やカード番号は隠してOK</small></div>
          <div id="scanLine" class="scanLine"></div>
        </label>
      </div>
      <button id="readButton" class="mainButton" type="button" disabled>レシートを解析</button>
      <button id="sampleButton" class="textButton" type="button">サンプルレシートで召喚</button>
      <p class="privacy">画像は端末内で処理され、送信されません</p>
    </section>

    <section id="editScreen" class="screen">
      <div class="receipt">
        <div class="receiptTop">RECEIPT DATA <span id="ocrStatus">解析完了</span></div>
        <label>購入した商品<textarea id="itemsText" rows="7" placeholder="商品名を1行ずつ入力"></textarea></label>
        <div class="receiptRow"><label>合計金額<input id="totalInput" type="number" inputmode="numeric" value="777" /></label><label>購入時刻<input id="timeInput" type="time" value="23:48" /></label></div>
        <div class="barcode">|||| || | ||||| | | ||| || ||||</div>
      </div>
      <button id="summonButton" class="mainButton summonButton" type="button">召喚する</button>
      <button id="backButton" class="textButton" type="button">撮り直す</button>
    </section>

    <section id="summonScreen" class="screen summonScreen">
      <div class="portal"><i></i><i></i><i></i><div id="monster" class="monster"><div class="horn h1"></div><div class="horn h2"></div><div class="body"><span class="eye e1"></span><span class="eye e2"></span><b class="mouth"></b></div><div class="arm a1"></div><div class="arm a2"></div><div class="shadow"></div></div></div>
      <div id="reveal" class="reveal">
        <p id="rarity" class="rarity">★★★ RARE</p>
        <h2 id="monsterName">限界労働獣 ネムレナイト</h2>
        <p id="monsterType" class="monsterType">闇／炭水化物属性</p>
        <div class="stats"><span>HP <b id="hp">82</b></span><span>攻撃 <b id="attack">61</b></span><span>理性 <b id="sense">14</b></span></div>
        <div class="skill"><small>固有技</small><strong id="skillName">糖分による問題の先送り</strong><p id="description">胃薬がある限り、致命傷を一度だけ無視する。</p></div>
        <button id="againButton" class="mainButton" type="button">別のレシートを召喚</button>
      </div>
    </section>
  </main>
  <div id="loading" class="loading"><div class="loader"></div><strong>レシート解読中...</strong><span id="progress">0%</span></div>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="/apps/2026-07-11/script.js"></script>
</body>
</html>
