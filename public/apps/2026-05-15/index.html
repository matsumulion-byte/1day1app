<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>止めろ！開幕PK</title>
  <link rel="stylesheet" href="/apps/2026-05-15/style.css" />
</head>
<body>
  <main class="app">
    <section class="title-screen" id="titleScreen">
      <div class="stadium-lights"></div>
      <h1>止めろ！<br>開幕PK</h1>
      <p class="lead">
        1993年5月15日、Jリーグ開幕。<br>
        ボールの軌道はだいぶ嘘。<br>
        でも止めれば全部正義。
      </p>
      <button class="primary-button" id="startButton">キックオフ</button>
      <p class="small-note">5本勝負。左・中央・右を読んで止めろ。</p>
    </section>

    <section class="game-screen hidden" id="gameScreen">
      <header class="game-header">
        <div>
          <span class="label">ROUND</span>
          <strong id="roundText">1 / 5</strong>
        </div>
        <div>
          <span class="label">SAVE</span>
          <strong id="saveText">0</strong>
        </div>
      </header>

      <div class="message" id="message">構えろ。</div>

      <div class="field" id="field">
        <div class="crowd crowd-back"></div>
        <div class="crowd crowd-front"></div>

        <div class="goal">
          <div class="net-lines vertical"></div>
          <div class="net-lines horizontal"></div>
        </div>

        <div class="keeper" id="keeper">
          <div class="keeper-head"></div>
          <div class="keeper-body"></div>
          <div class="keeper-arm left"></div>
          <div class="keeper-arm right"></div>
          <div class="keeper-leg left"></div>
          <div class="keeper-leg right"></div>
        </div>

        <div class="kicker" id="kicker">
          <div class="kicker-head"></div>
          <div class="kicker-body"></div>
          <div class="kicker-leg support"></div>
          <div class="kicker-leg kick"></div>
        </div>

        <div class="ball" id="ball"></div>
        <div class="impact hidden" id="impact"></div>
      </div>

      <div class="controls">
        <button class="choice-button" data-dir="left">← 左</button>
        <button class="choice-button" data-dir="center">中央</button>
        <button class="choice-button" data-dir="right">右 →</button>
      </div>
    </section>

    <section class="result-screen hidden" id="resultScreen">
      <h2 id="resultTitle">結果</h2>
      <p class="result-score" id="resultScore">0 / 5 SAVE</p>
      <p class="result-rank" id="resultRank">芝を見ていた人</p>
      <button class="primary-button" id="retryButton">もう一回守る</button>
    </section>
  </main>

  <script type="module" src="/apps/2026-05-15/main.js"></script>
</body>
</html>
