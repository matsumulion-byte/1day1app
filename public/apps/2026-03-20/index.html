<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>松村を探せ！in動物園</title>
  <link rel="stylesheet" href="/apps/2026-03-20/style.css" />
</head>
<body>
  <div id="app">
    <header class="hud">
      <div class="hud__left">
        <div class="title">松村を探せ！in動物園</div>
        <div class="stage" id="stageLabel">STAGE 1 / 3</div>
      </div>
      <div class="hud__right">
        <div class="timer" id="timer">10.0</div>
      </div>
    </header>

    <main class="game">
      <section class="screen screen--start active" id="startScreen">
        <div class="panel">
          <h1>松村を探せ！in動物園</h1>
          <p>パンダ・ゴリラ・ハシビロコウの展示の中に、1体だけ松村が混ざっています。</p>
          <p>各面10秒。見つけたと思ったらタップ。</p>
          <button class="btn" id="startButton">スタート</button>
        </div>
      </section>

      <section class="screen screen--play" id="playScreen">
        <div class="imageWrap" id="imageWrap">
          <img class="bg" id="bgImage" src="" alt="動物園展示" />
          <img class="matsumura" id="matsumuraImage" src="" alt="松村" />
          <div class="flash" id="flash"></div>
          <div class="message" id="message"></div>
        </div>
      </section>

      <section class="screen screen--result" id="resultScreen">
        <div class="panel">
          <h2 id="resultTitle">結果</h2>
          <p id="resultScore">3 / 3 発見</p>
          <p id="resultText">かなり松村に詳しい</p>
          <button class="btn" id="retryButton">もう一回</button>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/apps/2026-03-20/main.js"></script>
</body>
</html>
