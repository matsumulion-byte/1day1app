<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>ロゴの日メーカー</title>
  <meta name="description" content="6/5 ロゴの日。名前を入れるだけで、それっぽいロゴを即席生成するミニアプリ。" />
  <link rel="stylesheet" href="/apps/2026-06-05/style.css?v=20260605-1" />
</head>
<body>
  <main class="app">
    <section class="maker">
      <div class="preview-panel">
        <p class="date">6/5 ロゴの日</p>
        <div id="logoStage" class="logo-stage" aria-label="生成されたロゴ"></div>
        <p id="tagline" class="tagline">名前を入れると、それっぽく整えます。</p>
      </div>

      <div class="control-panel">
        <h1>ロゴの日<br>メーカー</h1>

        <label class="field">
          <span>名前</span>
          <input id="nameInput" type="text" value="MATSUMURA" maxlength="18" autocomplete="off" />
        </label>

        <div class="mode-row" aria-label="ロゴの方向性">
          <button class="mode is-active" data-mode="studio">STUDIO</button>
          <button class="mode" data-mode="pop">POP</button>
          <button class="mode" data-mode="wa">WA</button>
          <button class="mode" data-mode="mono">MONO</button>
        </div>

        <div class="option-grid">
          <label>
            <span>勢い</span>
            <input id="energyInput" type="range" min="0" max="100" value="56" />
          </label>
          <label>
            <span>余白</span>
            <input id="spaceInput" type="range" min="0" max="100" value="48" />
          </label>
        </div>

        <div class="button-row">
          <button id="shuffleBtn" class="secondary">まぜる</button>
          <button id="downloadBtn" class="primary">SVG保存</button>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="/apps/2026-06-05/main.js?v=20260605-1"></script>
</body>
</html>
