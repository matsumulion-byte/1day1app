<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>僕の考えた超人メーカー</title>
  <meta name="description" content="金曜の29日はキン肉の日。CSSだけで変な超人をつくる投稿コーナー風メーカー。" />
  <link rel="stylesheet" href="/apps/2026-05-29/style.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="date-label">5/29 金曜の29日はキン肉の日</p>
      <h1>僕の考えた<br>超人メーカー</h1>
      <p class="lead">名前を入れて投稿すると、だいぶ雑な超人が採用されます。</p>
    </header>

    <section class="post-panel">
      <form id="form" class="form">
        <label class="field">
          <span>投稿者名</span>
          <input id="nameInput" type="text" maxlength="12" placeholder="例：まつむら" />
        </label>

        <label class="field">
          <span>超人の方向性</span>
          <select id="typeSelect">
            <option value="slime">ぬめぬめ</option>
            <option value="fire">もえている</option>
            <option value="ghost">とうめい</option>
            <option value="box">やたら四角い</option>
            <option value="reverse">さかさまっぽい</option>
            <option value="random">おまかせ</option>
          </select>
        </label>

        <button class="submit-button" type="submit">超人を投稿する</button>
      </form>
    </section>

    <section id="result" class="result" hidden>
      <article class="card">
        <div class="card-head">
          <div>
            <p class="corner">読者投稿超人図鑑</p>
            <p class="number">No.<span id="numberText">029</span></p>
          </div>
          <div id="stamp" class="stamp">採用!</div>
        </div>

        <div class="card-body">
          <div class="choujin-frame">
            <div id="choujin" class="choujin">
              <div class="aura aura-1"></div>
              <div class="aura aura-2"></div>
              <div class="wing wing-left"></div>
              <div class="wing wing-right"></div>
              <div class="horn horn-left"></div>
              <div class="horn horn-right"></div>
              <div class="head">
                <div class="eye eye-left"></div>
                <div class="eye eye-right"></div>
                <div class="eye eye-third"></div>
                <div class="mouth"></div>
              </div>
              <div class="neck"></div>
              <div class="arm arm-left"></div>
              <div class="arm arm-right"></div>
              <div class="body">
                <div class="mark"></div>
                <div class="belt"></div>
              </div>
              <div class="leg leg-left"></div>
              <div class="leg leg-right"></div>
            </div>
            <p id="visualCaption" class="visual-caption">全身図</p>
          </div>

          <div class="profile">
            <h2 id="heroName">ヌメリマン</h2>

            <dl>
              <div>
                <dt>出身地</dt>
                <dd id="birthplace"></dd>
              </div>
              <div>
                <dt>超人強度</dt>
                <dd id="power"></dd>
              </div>
              <div>
                <dt>必殺技</dt>
                <dd id="move"></dd>
              </div>
              <div>
                <dt>弱点</dt>
                <dd id="weakness"></dd>
              </div>
              <div>
                <dt>口ぐせ</dt>
                <dd id="phrase"></dd>
              </div>
              <div>
                <dt>特徴</dt>
                <dd id="feature"></dd>
              </div>
            </dl>

            <p id="description" class="description"></p>
          </div>
        </div>

        <div class="judge-box">
          <p class="judge-label">編集部判定</p>
          <p id="judge" class="judge"></p>
        </div>

        <div class="actions">
          <button id="rerollButton" class="sub-button" type="button">もう一体投稿する</button>
        </div>
      </article>
    </section>
  </main>

  <script type="module" src="/apps/2026-05-29/main.js"></script>
</body>
</html>
