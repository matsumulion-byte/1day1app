<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Caramel Box Sokoban</title>
  <style>
    :root {
      --paper: #fff7d9;
      --ink: #3a2117;
      --red: #b92f2a;
      --gold: #f0b431;
      --gold-dark: #bd7d18;
      --caramel: #b96b33;
      --caramel-dark: #724021;
      --milk: #fff2c5;
      --green: #2f7a63;
      --shadow: rgba(68, 37, 21, .22);
      --cell: min(8.6vw, 58px);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: ui-rounded, "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif;
      background:
        linear-gradient(90deg, rgba(185, 47, 42, .1) 0 12px, transparent 12px 44px),
        radial-gradient(circle at 12% 18%, rgba(255,255,255,.58), transparent 26%),
        linear-gradient(145deg, #f4c148 0%, #ffd967 42%, #d74d33 43%, #ae2c27 64%, #f4c148 65%);
      display: grid;
      place-items: center;
      padding: 18px;
      overflow-x: hidden;
    }

    .app {
      width: min(1060px, 100%);
      min-height: min(720px, calc(100vh - 36px));
      display: grid;
      grid-template-columns: minmax(320px, 1fr) 330px;
      gap: 18px;
      align-items: stretch;
    }

    .game-shell,
    .panel {
      border: 4px solid #7b231c;
      background: var(--paper);
      box-shadow: 0 20px 42px var(--shadow);
    }

    .game-shell {
      position: relative;
      min-height: 620px;
      padding: 20px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
      overflow: hidden;
    }

    .game-shell::before,
    .game-shell::after {
      content: "";
      position: absolute;
      inset-inline: 0;
      height: 20px;
      background: repeating-linear-gradient(90deg, #b92f2a 0 36px, #fff1c3 36px 72px);
      opacity: .95;
    }

    .game-shell::before {
      top: 0;
    }

    .game-shell::after {
      bottom: 0;
    }

    header {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding-top: 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.8rem);
      line-height: .92;
      letter-spacing: 0;
      color: #8f241f;
      text-transform: uppercase;
      text-shadow: 0 3px 0 #ffefb3;
    }

    .date-badge {
      width: 90px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 3px solid #8f241f;
      border-radius: 50%;
      background: #fff2c5;
      color: #8f241f;
      font-weight: 900;
      text-align: center;
      line-height: 1.05;
      flex: 0 0 auto;
      transform: rotate(6deg);
    }

    .board-wrap {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      min-height: 0;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(var(--cols), var(--cell));
      grid-template-rows: repeat(var(--rows), var(--cell));
      gap: 5px;
      padding: 12px;
      border: 5px solid #8f241f;
      background:
        linear-gradient(90deg, rgba(255,255,255,.18), transparent 18% 82%, rgba(0,0,0,.06)),
        #d63e31;
      box-shadow: inset 0 0 0 4px #f4c148, 0 14px 30px rgba(59, 30, 15, .22);
      touch-action: none;
    }

    .cell {
      position: relative;
      display: grid;
      place-items: center;
      width: var(--cell);
      height: var(--cell);
      border-radius: 8px;
      background: rgba(255, 239, 184, .5);
      box-shadow: inset 0 2px 0 rgba(255,255,255,.35);
    }

    .wall {
      background:
        linear-gradient(135deg, rgba(255,255,255,.28), transparent 42%),
        #8f241f;
      box-shadow: inset 0 -5px 0 #5d1715, inset 0 3px 0 #c24a3d;
    }

    .floor::after {
      content: "";
      width: 36%;
      height: 36%;
      border-radius: 50%;
      border: 2px dashed rgba(255,255,255,.32);
      opacity: .45;
    }

    .goal {
      background:
        radial-gradient(circle, #fff9e0 0 28%, transparent 29%),
        repeating-linear-gradient(45deg, rgba(255,255,255,.28) 0 6px, transparent 6px 12px),
        #2f7a63;
    }

    .goal::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 2px solid rgba(255,255,255,.72);
      border-radius: 6px;
    }

    .crate {
      width: 84%;
      height: 74%;
      border-radius: 9px;
      background:
        linear-gradient(90deg, rgba(255,242,197,.72) 0 15%, transparent 15% 85%, rgba(255,242,197,.5) 85%),
        linear-gradient(145deg, #d38a48, var(--caramel) 54%, #8d4c27);
      border: 2px solid #6d351d;
      box-shadow: 0 6px 0 var(--caramel-dark), 0 10px 16px rgba(40, 20, 10, .26);
      display: grid;
      place-items: center;
      color: #fff5d2;
      font-size: calc(var(--cell) * .28);
      font-weight: 900;
      transform: translateY(-2px);
    }

    .crate::before {
      content: "MILK";
      padding: 1px 5px;
      border: 1px solid rgba(255,255,255,.76);
      background: rgba(96, 44, 19, .3);
      border-radius: 999px;
      font-size: .7em;
    }

    .crate.done {
      background:
        linear-gradient(90deg, rgba(255,242,197,.88) 0 15%, transparent 15% 85%, rgba(255,242,197,.72) 85%),
        linear-gradient(145deg, #e6a458, #c07439 54%, #875029);
      outline: 3px solid #fff2c5;
    }

    .player {
      width: 76%;
      height: 76%;
      border-radius: 12px 12px 16px 16px;
      background:
        radial-gradient(circle at 50% 26%, #5b2b1a 0 7%, transparent 8%),
        linear-gradient(#fff7d9 0 26%, #b92f2a 27% 62%, #fff7d9 63%);
      border: 3px solid #5c1b18;
      box-shadow: 0 5px 0 #6d201c, 0 9px 14px rgba(48, 20, 9, .24);
      transform: translateY(-3px);
    }

    .status {
      position: relative;
      z-index: 1;
      min-height: 42px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-weight: 800;
    }

    .message {
      color: #7b231c;
    }

    .panel {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .score-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat {
      padding: 10px 8px;
      background: #fff2c5;
      border: 2px solid #d4992e;
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 1.45rem;
      line-height: 1;
      color: #8f241f;
    }

    .stat span {
      font-size: .78rem;
      font-weight: 800;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      background: #8f241f;
      color: #fff7d9;
      font: inherit;
      font-weight: 900;
      box-shadow: 0 4px 0 #5d1715;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #5d1715;
    }

    button.secondary {
      background: #2f7a63;
      box-shadow: 0 4px 0 #1c5141;
    }

    .level-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .level-btn.active {
      background: var(--gold-dark);
      box-shadow: 0 4px 0 #784d0d;
    }

    .howto {
      margin: 0;
      padding: 14px;
      background: #fff2c5;
      border-left: 5px solid #b92f2a;
      line-height: 1.7;
      font-size: .95rem;
    }

    .dpad {
      margin-top: auto;
      display: grid;
      grid-template-columns: repeat(3, 64px);
      grid-template-rows: repeat(3, 54px);
      gap: 8px;
      justify-content: center;
    }

    .dpad button {
      min-height: 54px;
      font-size: 1.3rem;
      background: #f0b431;
      color: #5d1715;
      box-shadow: 0 4px 0 #9d6712;
    }

    .dpad .up {
      grid-column: 2;
    }

    .dpad .left {
      grid-column: 1;
      grid-row: 2;
    }

    .dpad .right {
      grid-column: 3;
      grid-row: 2;
    }

    .dpad .down {
      grid-column: 2;
      grid-row: 3;
    }

    .ribbon {
      position: fixed;
      right: 18px;
      bottom: 14px;
      padding: 7px 12px;
      background: rgba(255,247,217,.9);
      border: 2px solid #8f241f;
      font-size: .78rem;
      font-weight: 900;
      transform: rotate(-2deg);
    }

    @media (max-width: 860px) {
      body {
        padding: 10px;
        padding-bottom: 220px;
        align-items: start;
      }

      .app {
        grid-template-columns: 1fr;
      }

      .game-shell {
        min-height: auto;
        padding: 18px 10px;
      }

      .board {
        --cell: min(42px, calc((100vw - 74px) / var(--cols)));
        gap: 3px;
        padding: 8px;
        border-width: 4px;
      }

      header {
        padding-inline: 8px;
      }

      h1 {
        font-size: clamp(2rem, 12vw, 3.2rem);
      }

      .date-badge {
        width: 72px;
        font-size: .82rem;
      }

      .panel {
        min-height: 0;
        gap: 10px;
        padding: 12px;
      }

      .score-row {
        order: 1;
      }

      .controls {
        order: 3;
      }

      .level-list {
        order: 4;
      }

      .howto {
        order: 5;
        font-size: .86rem;
        line-height: 1.55;
        padding: 10px 12px;
      }

      .dpad {
        order: 2;
        position: fixed;
        z-index: 4;
        left: 50%;
        bottom: max(10px, env(safe-area-inset-bottom));
        width: min(calc(100vw - 32px), 310px);
        grid-template-columns: repeat(3, minmax(70px, 1fr));
        grid-template-rows: repeat(3, 58px);
        gap: 10px;
        margin: 0;
        padding: 10px;
        border: 3px solid #7b231c;
        background: rgba(255, 247, 217, .94);
        box-shadow: 0 12px 30px rgba(68, 37, 21, .24);
        transform: translateX(-50%);
      }

      .dpad button {
        min-height: 58px;
        font-size: 1.55rem;
      }

      .status {
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
        padding-inline: 4px;
      }

      .ribbon {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="キャラメル倉庫番ゲーム">
    <section class="game-shell">
      <header>
        <h1>Caramel<br>Box</h1>
        <div class="date-badge">6/10<br>Milk<br>Caramel</div>
      </header>

      <div class="board-wrap">
        <div id="board" class="board" aria-live="polite"></div>
      </div>

      <div class="status">
        <div id="levelName"></div>
        <div id="message" class="message">キャラメルを緑の包装ラインへ</div>
      </div>
    </section>

    <aside class="panel">
      <div class="score-row">
        <div class="stat"><strong id="moves">0</strong><span>Moves</span></div>
        <div class="stat"><strong id="pushed">0</strong><span>Pushed</span></div>
        <div class="stat"><strong id="packed">0/0</strong><span>Packed</span></div>
      </div>

      <div class="controls">
        <button id="undo" type="button">Undo</button>
        <button id="restart" class="secondary" type="button">Restart</button>
      </div>

      <div id="levels" class="level-list" aria-label="ステージ選択"></div>

      <p class="howto">
        矢印キー、WASD、画面ボタンで移動。キャラメルは押すだけで引けません。全部のキャラメルを包装ラインに乗せたらクリアです。
      </p>

      <div class="dpad" aria-label="移動ボタン">
        <button class="up" type="button" data-dir="up" aria-label="上へ">↑</button>
        <button class="left" type="button" data-dir="left" aria-label="左へ">←</button>
        <button class="right" type="button" data-dir="right" aria-label="右へ">→</button>
        <button class="down" type="button" data-dir="down" aria-label="下へ">↓</button>
      </div>
    </aside>
  </main>
  <div class="ribbon">Time to pack something sweet.</div>

  <script>
    const levels = [
      {
        name: "Level 1 / Sweet Warmup",
        map: [
          "########",
          "#      #",
          "# .$$. #",
          "#  $@  #",
          "#  .   #",
          "#      #",
          "########"
        ]
      },
      {
        name: "Level 2 / Side Wrap",
        map: [
          "########",
          "#  .   #",
          "#  $$  #",
          "# .#@  #",
          "#  $ . #",
          "#      #",
          "########"
        ]
      },
      {
        name: "Level 3 / Factory Lane",
        map: [
          "##########",
          "#        #",
          "# . $$ . #",
          "#   #@   #",
          "#  $ .   #",
          "#        #",
          "##########"
        ]
      }
    ];

    const dirs = {
      up: { x: 0, y: -1 },
      down: { x: 0, y: 1 },
      left: { x: -1, y: 0 },
      right: { x: 1, y: 0 }
    };

    const keyMap = {
      ArrowUp: "up",
      ArrowDown: "down",
      ArrowLeft: "left",
      ArrowRight: "right",
      w: "up",
      s: "down",
      a: "left",
      d: "right"
    };

    const boardEl = document.querySelector("#board");
    const levelNameEl = document.querySelector("#levelName");
    const messageEl = document.querySelector("#message");
    const movesEl = document.querySelector("#moves");
    const pushedEl = document.querySelector("#pushed");
    const packedEl = document.querySelector("#packed");
    const levelsEl = document.querySelector("#levels");

    let levelIndex = 0;
    let state;
    let history = [];

    function parseLevel(level) {
      const walls = new Set();
      const goals = new Set();
      const crates = new Set();
      let player = { x: 0, y: 0 };

      level.map.forEach((row, y) => {
        [...row].forEach((tile, x) => {
          const key = at(x, y);
          if (tile === "#") walls.add(key);
          if (tile === "." || tile === "*" || tile === "+") goals.add(key);
          if (tile === "$" || tile === "*") crates.add(key);
          if (tile === "@" || tile === "+") player = { x, y };
        });
      });

      return {
        walls,
        goals,
        crates,
        player,
        moves: 0,
        pushed: 0,
        rows: level.map.length,
        cols: Math.max(...level.map.map(row => row.length))
      };
    }

    function at(x, y) {
      return `${x},${y}`;
    }

    function cloneState(source) {
      return {
        ...source,
        player: { ...source.player },
        crates: new Set(source.crates),
        walls: source.walls,
        goals: source.goals
      };
    }

    function loadLevel(nextIndex) {
      levelIndex = nextIndex;
      state = parseLevel(levels[levelIndex]);
      history = [];
      messageEl.textContent = "キャラメルを緑の包装ラインへ";
      render();
    }

    function renderLevelButtons() {
      levelsEl.innerHTML = "";
      levels.forEach((_, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `level-btn${index === levelIndex ? " active" : ""}`;
        button.textContent = `Lv ${index + 1}`;
        button.addEventListener("click", () => loadLevel(index));
        levelsEl.appendChild(button);
      });
    }

    function render() {
      boardEl.style.setProperty("--rows", state.rows);
      boardEl.style.setProperty("--cols", state.cols);
      boardEl.innerHTML = "";

      for (let y = 0; y < state.rows; y += 1) {
        for (let x = 0; x < state.cols; x += 1) {
          const key = at(x, y);
          const cell = document.createElement("div");
          cell.className = "cell";
          if (state.walls.has(key)) cell.classList.add("wall");
          else if (state.goals.has(key)) cell.classList.add("goal");
          else cell.classList.add("floor");

          if (state.crates.has(key)) {
            const crate = document.createElement("div");
            crate.className = `crate${state.goals.has(key) ? " done" : ""}`;
            cell.appendChild(crate);
          }

          if (state.player.x === x && state.player.y === y) {
            const player = document.createElement("div");
            player.className = "player";
            cell.appendChild(player);
          }

          boardEl.appendChild(cell);
        }
      }

      const packed = [...state.crates].filter(crate => state.goals.has(crate)).length;
      levelNameEl.textContent = levels[levelIndex].name;
      movesEl.textContent = state.moves;
      pushedEl.textContent = state.pushed;
      packedEl.textContent = `${packed}/${state.goals.size}`;
      renderLevelButtons();

      if (packed === state.goals.size) {
        messageEl.textContent = "包装完了。甘い勝利です。";
      }
    }

    function isBlocked(x, y) {
      return state.walls.has(at(x, y));
    }

    function move(dirName) {
      const dir = dirs[dirName];
      const next = { x: state.player.x + dir.x, y: state.player.y + dir.y };
      const nextKey = at(next.x, next.y);

      if (isBlocked(next.x, next.y)) {
        messageEl.textContent = "箱の壁には押し込めません";
        return;
      }

      const hasCrate = state.crates.has(nextKey);
      if (hasCrate) {
        const beyond = { x: next.x + dir.x, y: next.y + dir.y };
        const beyondKey = at(beyond.x, beyond.y);
        if (isBlocked(beyond.x, beyond.y) || state.crates.has(beyondKey)) {
          messageEl.textContent = "キャラメルが詰まっています";
          return;
        }

        history.push(cloneState(state));
        state.crates.delete(nextKey);
        state.crates.add(beyondKey);
        state.player = next;
        state.moves += 1;
        state.pushed += 1;
      } else {
        history.push(cloneState(state));
        state.player = next;
        state.moves += 1;
      }

      messageEl.textContent = "いい押し味";
      render();
    }

    function undo() {
      const previous = history.pop();
      if (!previous) {
        messageEl.textContent = "まだ戻せる手がありません";
        return;
      }
      state = previous;
      messageEl.textContent = "一手戻しました";
      render();
    }

    document.addEventListener("keydown", event => {
      const dir = keyMap[event.key];
      if (!dir) return;
      event.preventDefault();
      move(dir);
    });

    document.querySelector("#undo").addEventListener("click", undo);
    document.querySelector("#restart").addEventListener("click", () => loadLevel(levelIndex));

    let holdDelay = null;
    let holdRepeat = null;

    function stopHold() {
      window.clearTimeout(holdDelay);
      window.clearInterval(holdRepeat);
      holdDelay = null;
      holdRepeat = null;
    }

    document.querySelectorAll("[data-dir]").forEach(button => {
      button.addEventListener("pointerdown", event => {
        event.preventDefault();
        button.setPointerCapture(event.pointerId);
        move(button.dataset.dir);
        stopHold();
        holdDelay = window.setTimeout(() => {
          holdRepeat = window.setInterval(() => move(button.dataset.dir), 140);
        }, 260);
      });
      button.addEventListener("pointerup", stopHold);
      button.addEventListener("pointercancel", stopHold);
      button.addEventListener("pointerleave", stopHold);
    });

    let touchStart = null;
    boardEl.addEventListener("pointerdown", event => {
      touchStart = { x: event.clientX, y: event.clientY };
      boardEl.setPointerCapture(event.pointerId);
    });

    boardEl.addEventListener("pointerup", event => {
      if (!touchStart) return;
      const dx = event.clientX - touchStart.x;
      const dy = event.clientY - touchStart.y;
      touchStart = null;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 14) return;
      move(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? "right" : "left") : (dy > 0 ? "down" : "up"));
    });

    loadLevel(0);
  </script>
</body>
</html>
