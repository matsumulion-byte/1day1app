<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <title>マネキンじゃない松村を探せ</title>
    <link rel="stylesheet" href="/apps/2026-03-24/style.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <p class="date">03.24</p>
        <h1>マネキンじゃない松村を探せ</h1>
        <p class="lead">
          この中に、マネキンじゃない松村が1人います。<br />
          まばたきした瞬間をタップしてください。
        </p>
      </header>

      <main class="main">
        <section class="stage-wrap">
          <div class="stage-header">
            <div class="status">
              <span class="status-label">残り時間</span>
              <span id="timeText" class="time-text">30</span>
            </div>
            <div class="progress" aria-hidden="true">
              <div id="progressBar" class="progress-bar"></div>
            </div>
          </div>

          <section id="stage" class="stage hidden" aria-label="ゲームステージ">
            <button class="doll" data-index="0" aria-label="松村 1">
              <div class="doll-frame">
                <img class="doll-img" src="" alt="" />
              </div>
            </button>

            <button class="doll" data-index="1" aria-label="松村 2">
              <div class="doll-frame">
                <img class="doll-img" src="" alt="" />
              </div>
            </button>

            <button class="doll" data-index="2" aria-label="松村 3">
              <div class="doll-frame">
                <img class="doll-img" src="" alt="" />
              </div>
            </button>

            <button class="doll" data-index="3" aria-label="松村 4">
              <div class="doll-frame">
                <img class="doll-img" src="" alt="" />
              </div>
            </button>
          </section>

          <div id="message" class="message">
            <p>スタートを押すと始まります</p>
          </div>
        </section>
      </main>

      <footer class="footer">
        <button id="startBtn" class="start-btn">スタート</button>
        <button id="retryBtn" class="retry-btn hidden">もう一回</button>
        <audio id="bgm" src="/apps/2026-03-24/assets/bgm.mp3" preload="auto" loop></audio>
      </footer>
    </div>

    <script type="module" src="/apps/2026-03-24/main.js"></script>
  </body>
</html>
