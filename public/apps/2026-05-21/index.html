<link rel="stylesheet" href="/apps/2026-05-21/style.css" />

<div id="game">
  <div id="hud">
    <div class="label">名探偵松村 尾行中</div>
    <div class="count">HIDE <span id="progress">0/5</span></div>
    <div id="status">容疑者を尾行しろ</div>
  </div>

  <div id="world">
    <div class="rain"></div>
    <div class="alley"></div>

    <div id="target">
      <div id="bubble">……？</div>
      <div class="suspect-head"></div>
      <div class="suspect-body"></div>
    </div>

    <div id="player">
      <div class="hat"></div>
      <div class="face"></div>
      <div class="coat"></div>
    </div>
  </div>

  <button id="hideBtn">隠れる</button>

  <div id="overlay">
    <div class="panel">
      <p class="eyebrow">NOIR TAILING GAME</p>
      <h1>名探偵松村<br>尾行中</h1>
      <p>「……？」が出たら、すぐに隠れろ。</p>
      <p>5回しのげば証拠をつかめる。</p>
      <button id="start">尾行開始</button>
    </div>
  </div>
</div>

<script type="module" src="/apps/2026-05-21/main.js"></script>
