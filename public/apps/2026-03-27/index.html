<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"
    />
    <title>フーして探せ！さくら松村</title>
    <link rel="stylesheet" href="/apps/2026-03-27/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="hud">
        <h1 class="title">フーして探せ！さくら松村</h1>
        <div class="status-row">
          <div class="chip">
            <span class="chip-label">TIME</span>
            <span id="timer" class="chip-value">15.0</span>
          </div>
          <div class="chip meter-chip">
            <span class="chip-label">BREATH</span>
            <div class="meter">
              <div id="meterFill" class="meter-fill"></div>
            </div>
          </div>
        </div>
      </header>

      <main class="game-shell">
        <section id="game" class="game" aria-label="ゲーム画面">
          <div class="bg"></div>

          <button id="target" class="target hidden" aria-label="松村をタップ">
            <img id="targetImg" alt="松村" />
          </button>

          <canvas id="petalCanvas" class="petal-canvas"></canvas>

          <div id="intro" class="overlay">
            <div class="panel">
              <p class="lead">息を吹きかけて桜の花びらを飛ばし、松村を見つけてタップ</p>
              <p class="sub">最初にマイクを許可してください</p>
              <button id="startBtn" class="btn primary">マイクをONにしてスタート</button>
            </div>
          </div>

          <div id="result" class="overlay hidden">
            <div class="panel">
              <p id="resultTitle" class="result-title">見つけた！</p>
              <p id="resultText" class="result-text"></p>
              <button id="retryBtn" class="btn primary">もう一回</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/apps/2026-03-27/main.js"></script>
  </body>
</html>
