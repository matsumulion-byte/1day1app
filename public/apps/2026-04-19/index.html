<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>世界シルエットクイズ</title>
  <link rel="stylesheet" href="/apps/2026-04-19/style.css" />
</head>
<body>
  <main class="app">
    <section id="start-screen" class="screen active">
      <div class="card intro-card">
        <p class="eyebrow">4/19 地図の日</p>
        <h1>世界シルエットクイズ</h1>
        <p class="intro-text">
          国のシルエットを見て、正しい国名を4択から選ぼう。<br>
          全5問です。
        </p>
        <button id="start-btn" class="primary-btn">スタート</button>
      </div>
    </section>

    <section id="quiz-screen" class="screen">
      <div class="topbar">
        <div id="progress" class="progress">1 / 5</div>
        <div id="score" class="score">正解 0</div>
      </div>

      <div class="card quiz-card">
        <p class="question-label">この国はどこ？</p>

        <div class="image-wrap">
          <img id="country-image" alt="国のシルエット" />
        </div>

        <div id="choices" class="choices"></div>

        <p id="feedback" class="feedback" aria-live="polite"></p>
        <button id="next-btn" class="secondary-btn hidden">次へ</button>
      </div>
    </section>

    <section id="result-screen" class="screen">
      <div class="card result-card">
        <p class="eyebrow">結果</p>
        <h2 id="result-title">3 / 5</h2>
        <p id="result-text" class="result-text"></p>
        <button id="retry-btn" class="primary-btn">もう一回</button>
      </div>
    </section>
  </main>

  <script type="module" src="/apps/2026-04-19/main.js"></script>
</body>
</html>
