<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>開港！ぼったくり貿易商</title>
  <link rel="stylesheet" href="/apps/2026-06-28/styles.css" />
</head>

<body>
  <div class="app">
    <section id="startScreen" class="screen active">
      <div class="panel">
        <h1>開港！<br>ぼったくり貿易商</h1>
        <p class="lead">
          今日は貿易記念日。<br>
          商品を安く仕入れて高く売り、<br>
          35秒でできるだけ儲けよう。
        </p>
        <p class="note">
          「舶来品ラベル」を貼ると価格は上がる。<br>
          ただし、貼りすぎると信用を失います。
        </p>
        <button id="startBtn">開港する</button>
      </div>
    </section>

    <section id="resultScreen" class="screen">
      <div class="panel">
        <div id="resultTitle" class="resultTitle">結果</div>
        <div id="resultAsset" class="resultAsset">¥0</div>
        <div id="resultText" class="resultText"></div>
        <div id="resultSmall" class="resultSmall"></div>
        <button id="retryBtn">もう一度開港する</button>
      </div>
    </section>

    <main class="game">
      <div class="hud">
        <div class="hudItem">現金 <span id="cash">¥1000</span></div>
        <div class="hudItem">総資産 <span id="asset">¥1000</span></div>
        <div class="hudItem">残り時間 <span id="time">35</span></div>
        <div class="hudItem">
          信用
          <span id="creditText">100</span>
          <div class="creditWrap"><div id="creditBar" class="creditBar"></div></div>
        </div>
      </div>

      <div id="news" class="news">港が開きました。商売の時間です。</div>

      <div id="market" class="market"></div>

      <div id="toast" class="toast"></div>
      <div id="log" class="log"></div>
    </main>
  </div>

  <script src="/apps/2026-06-28/script.js"></script>
</body>
</html>
