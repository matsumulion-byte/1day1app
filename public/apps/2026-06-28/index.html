<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>パーフェクトパフェ</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background:
        radial-gradient(circle at top, #fff7d8 0%, #ffd3df 42%, #f49ab7 100%);
      color: #3b1d24;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      z-index: 50;
    }

    .screen.active {
      display: flex;
    }

    .panel {
      width: min(92vw, 460px);
      padding: 28px 24px;
      border-radius: 30px;
      background: rgba(255,255,255,0.9);
      text-align: center;
      box-shadow: 0 18px 42px rgba(70,20,40,0.24);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(42px, 10vw, 64px);
      line-height: 0.98;
      letter-spacing: 0.04em;
    }

    .lead {
      margin: 0 0 18px;
      font-weight: 850;
      line-height: 1.8;
      font-size: 15px;
    }

    .note {
      margin-bottom: 22px;
      font-size: 12px;
      line-height: 1.7;
      font-weight: 700;
      opacity: 0.75;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 30px;
      font-size: 17px;
      font-weight: 900;
      color: #fff;
      background: #e33f72;
      box-shadow: 0 8px 0 #9f294c;
      cursor: pointer;
    }

    button:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 #9f294c;
    }

    .hud {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
    }

    .hudItem {
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.78);
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 5px 14px rgba(70,20,40,0.12);
    }

    .message {
      position: absolute;
      top: 64px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 25;
      min-width: 230px;
      max-width: 90vw;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(50,20,30,0.88);
      color: #fff;
      text-align: center;
      font-size: 14px;
      font-weight: 900;
      opacity: 0;
      transition: 0.18s;
      pointer-events: none;
    }

    .message.show {
      opacity: 1;
      transform: translateX(-50%) translateY(4px);
    }

    .order {
      position: absolute;
      top: 112px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 18;
      display: flex;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      box-shadow: 0 6px 18px rgba(70,20,40,0.12);
    }

    .orderItem {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #fff;
      font-size: 21px;
      opacity: 0.42;
      transition: 0.16s;
    }

    .orderItem.done {
      opacity: 1;
      transform: scale(1.1);
      background: #e33f72;
    }

    .falling {
      position: absolute;
      z-index: 15;
      width: 74px;
      height: 74px;
      display: grid;
      place-items: center;
      border-radius: 24px;
      background: rgba(255,255,255,0.86);
      font-size: 42px;
      box-shadow:
        inset 0 -8px 0 rgba(0,0,0,0.06),
        0 8px 20px rgba(80,20,40,0.16);
      cursor: pointer;
      touch-action: manipulation;
      animation: itemWobble 0.8s infinite alternate ease-in-out;
    }

    @keyframes itemWobble {
      from { transform: rotate(-5deg); }
      to { transform: rotate(5deg); }
    }

    .parfaitWrap {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      width: min(92vw, 390px);
      height: 560px;
      z-index: 5;
      pointer-events: none;
    }

    .parfaitSvg {
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 16px 18px rgba(80,20,40,0.18));
    }

    .part {
      opacity: 0;
      transform-origin: center;
      transform-box: fill-box;
      transition: opacity 0.22s ease-out, transform 0.22s ease-out;
      transform: translateY(-12px) scale(0.94);
    }

    .part.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .glassLine {
      fill: rgba(255,255,255,0.32);
      stroke: rgba(255,255,255,0.86);
      stroke-width: 7;
      stroke-linejoin: round;
    }

    .shine {
      fill: rgba(255,255,255,0.42);
    }

    .resultTitle {
      font-size: 34px;
      font-weight: 1000;
      line-height: 1.15;
      margin-bottom: 12px;
    }

    .resultText {
      font-size: 15px;
      font-weight: 850;
      line-height: 1.8;
      margin-bottom: 22px;
    }

    .miniResult {
      width: 220px;
      height: 270px;
      margin: 0 auto 10px;
    }

    .miniResult .part {
      opacity: 1;
      transform: none;
    }

    @media (max-height: 740px) {
      .parfaitWrap {
        bottom: -34px;
        transform: translateX(-50%) scale(0.86);
        transform-origin: bottom center;
      }

      .order {
        top: 102px;
      }
    }

    @media (max-width: 520px) {
      .falling {
        width: 64px;
        height: 64px;
        font-size: 36px;
      }

      .parfaitWrap {
        bottom: -6px;
        transform: translateX(-50%) scale(0.94);
        transform-origin: bottom center;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <section id="startScreen" class="screen active">
      <div class="panel">
        <h1>パーフェクト<br>パフェ</h1>
        <p class="lead">
          今日はパフェの日。<br>
          正しい順番で具材を選んで、<br>
          完全なパフェを完成させよう。
        </p>
        <div class="note">
          コーンフレーク → ゼリー → アイス → クリーム → いちご → チョコ。<br>
          ちくわと松村は入れない。
        </div>
        <button id="startBtn">パフェを作る</button>
      </div>
    </section>

    <section id="resultScreen" class="screen">
      <div class="panel">
        <div id="resultTitle" class="resultTitle">結果</div>
        <div id="miniResult" class="miniResult"></div>
        <div id="resultText" class="resultText"></div>
        <button id="retryBtn">もう一度作る</button>
      </div>
    </section>

    <div class="hud">
      <div class="hudItem">SCORE <span id="score">0</span></div>
      <div class="hudItem">TIME <span id="time">35</span></div>
    </div>

    <div id="message" class="message"></div>
    <div id="order" class="order"></div>

    <div class="parfaitWrap">
      <svg class="parfaitSvg" viewBox="0 0 390 560" aria-label="パフェ">
        <!-- stem / base -->
        <ellipse cx="195" cy="520" rx="92" ry="20" class="glassLine"/>
        <path d="M170 400 L220 400 L230 518 L160 518 Z" class="glassLine"/>

        <!-- glass -->
        <path d="M78 154 C92 420 120 450 195 450 C270 450 298 420 312 154 Z" class="glassLine"/>
        <ellipse cx="195" cy="154" rx="123" ry="34" class="glassLine"/>
        <path d="M115 185 C122 290 137 365 166 418" class="shine"/>
        <path d="M286 182 C278 300 260 370 226 420" fill="rgba(255,255,255,0.16)"/>

        <!-- corn layer -->
        <g id="part-corn" class="part">
          <path d="M99 365 C126 346 264 346 291 365 L276 420 C250 440 140 440 114 420 Z" fill="#d89735"/>
          <circle cx="130" cy="376" r="7" fill="#f5c15b"/>
          <circle cx="158" cy="398" r="8" fill="#a86524"/>
          <circle cx="194" cy="376" r="7" fill="#f5c15b"/>
          <circle cx="226" cy="401" r="8" fill="#a86524"/>
          <circle cx="258" cy="377" r="7" fill="#f5c15b"/>
        </g>

        <!-- jelly layer -->
        <g id="part-jelly" class="part">
          <path d="M91 300 C120 278 270 278 299 300 L291 365 C263 385 127 385 99 365 Z" fill="#e74872"/>
          <path d="M108 318 C135 302 256 302 282 318 L278 342 C242 358 148 358 112 342 Z" fill="rgba(255,255,255,0.22)"/>
        </g>

        <!-- ice layer -->
        <g id="part-ice" class="part">
          <path d="M105 258 C106 224 135 204 164 216 C177 180 230 180 243 216 C272 204 303 226 300 260 C282 285 122 285 105 258 Z" fill="#fff7fb"/>
          <circle cx="158" cy="236" r="36" fill="#fff"/>
          <circle cx="213" cy="226" r="42" fill="#ffe2ec"/>
          <circle cx="253" cy="240" r="32" fill="#fff"/>
        </g>

        <!-- cream layer -->
        <g id="part-cream" class="part">
          <circle cx="150" cy="194" r="32" fill="#fff"/>
          <circle cx="195" cy="174" r="42" fill="#fff"/>
          <circle cx="240" cy="194" r="32" fill="#fff"/>
          <circle cx="172" cy="220" r="38" fill="#fff"/>
          <circle cx="218" cy="220" r="38" fill="#fff"/>
          <path d="M160 155 C178 112 218 112 232 155 C212 144 184 144 160 155 Z" fill="#fff"/>
          <path d="M178 184 C192 176 211 176 224 184" fill="none" stroke="#f2dbe2" stroke-width="5" stroke-linecap="round"/>
        </g>

        <!-- strawberry -->
        <g id="part-strawberry" class="part">
          <path d="M130 153 C112 113 151 91 175 120 C179 156 143 179 130 153 Z" fill="#e62d55"/>
          <path d="M260 153 C278 113 239 91 215 120 C211 156 247 179 260 153 Z" fill="#e62d55"/>
          <path d="M142 110 L156 98 L164 116 Z" fill="#2f9b49"/>
          <path d="M248 110 L234 98 L226 116 Z" fill="#2f9b49"/>
          <circle cx="142" cy="133" r="2.5" fill="#fff2a8"/>
          <circle cx="152" cy="148" r="2.5" fill="#fff2a8"/>
          <circle cx="235" cy="133" r="2.5" fill="#fff2a8"/>
          <circle cx="246" cy="148" r="2.5" fill="#fff2a8"/>
        </g>

        <!-- chocolate / cherry -->
        <g id="part-choco" class="part">
          <path d="M134 174 C152 155 236 155 256 174 C252 194 137 194 134 174 Z" fill="#542615"/>
          <path d="M162 181 C162 206 146 210 146 231" fill="none" stroke="#542615" stroke-width="12" stroke-linecap="round"/>
          <path d="M226 181 C226 207 244 211 244 232" fill="none" stroke="#542615" stroke-width="12" stroke-linecap="round"/>
          <circle cx="195" cy="106" r="22" fill="#d8173f"/>
          <path d="M195 86 C195 64 211 54 225 52" fill="none" stroke="#2f7e39" stroke-width="6" stroke-linecap="round"/>
          <circle cx="187" cy="98" r="6" fill="rgba(255,255,255,0.42)"/>
        </g>

        <!-- bad item overlay -->
        <g id="part-bad" class="part">
          <circle cx="195" cy="260" r="52" fill="rgba(70,70,70,0.82)"/>
          <text id="badText" x="195" y="278" text-anchor="middle" font-size="48">👓</text>
        </g>
      </svg>
    </div>
  </div>

  <script>
    const startScreen = document.getElementById("startScreen");
    const resultScreen = document.getElementById("resultScreen");
    const startBtn = document.getElementById("startBtn");
    const retryBtn = document.getElementById("retryBtn");
    const scoreEl = document.getElementById("score");
    const timeEl = document.getElementById("time");
    const messageEl = document.getElementById("message");
    const orderEl = document.getElementById("order");
    const resultTitleEl = document.getElementById("resultTitle");
    const resultTextEl = document.getElementById("resultText");
    const miniResultEl = document.getElementById("miniResult");
    const badTextEl = document.getElementById("badText");

    const correctOrder = [
      { id: "corn", label: "コーンフレーク", emoji: "🥣", part: "part-corn" },
      { id: "jelly", label: "いちごゼリー", emoji: "🟥", part: "part-jelly" },
      { id: "ice", label: "アイス", emoji: "🍨", part: "part-ice" },
      { id: "cream", label: "生クリーム", emoji: "☁️", part: "part-cream" },
      { id: "strawberry", label: "いちご", emoji: "🍓", part: "part-strawberry" },
      { id: "choco", label: "チョコ", emoji: "🍫", part: "part-choco" },
    ];

    const badItems = [
      { id: "chikuwa", label: "ちくわ", emoji: "🟫" },
      { id: "karaage", label: "からあげ", emoji: "🍗" },
      { id: "wasabi", label: "わさび", emoji: "🟢" },
      { id: "matsumura", label: "松村", emoji: "👓" },
    ];

    let score = 0;
    let time = 35;
    let currentIndex = 0;
    let gameActive = false;
    let spawnTimer = null;
    let countdownTimer = null;
    let messageTimer = null;
    let badCount = 0;

    function resetParts() {
      document.querySelectorAll(".part").forEach(part => {
        part.classList.remove("show");
      });
    }

    function renderOrder() {
      orderEl.innerHTML = "";
      correctOrder.forEach((item, index) => {
        const el = document.createElement("div");
        el.className = "orderItem";
        if (index < currentIndex) el.classList.add("done");
        el.textContent = item.emoji;
        orderEl.appendChild(el);
      });
    }

    function startGame() {
      clearGame();

      score = 0;
      time = 35;
      currentIndex = 0;
      badCount = 0;
      gameActive = true;

      scoreEl.textContent = score;
      timeEl.textContent = time;

      resetParts();
      renderOrder();

      startScreen.classList.remove("active");
      resultScreen.classList.remove("active");

      showMessage("まずはコーンフレーク");

      spawnTimer = setInterval(spawnItem, 680);
      countdownTimer = setInterval(() => {
        time--;
        timeEl.textContent = time;
        if (time <= 0) endGame();
      }, 1000);
    }

    function clearGame() {
      clearInterval(spawnTimer);
      clearInterval(countdownTimer);
      document.querySelectorAll(".falling").forEach(el => el.remove());
      hideMessage();
    }

    function spawnItem() {
      if (!gameActive) return;

      let item;
      const correctChance = Math.random() < 0.5;

      if (correctChance && currentIndex < correctOrder.length) {
        item = correctOrder[currentIndex];
      } else {
        const pool = [
          ...correctOrder.filter(x => x.id !== correctOrder[currentIndex]?.id),
          ...badItems,
        ];
        item = pool[Math.floor(Math.random() * pool.length)];
      }

      const el = document.createElement("div");
      el.className = "falling";
      el.textContent = item.emoji;

      const size = window.innerWidth < 520 ? 64 : 74;
      const x = Math.random() * (window.innerWidth - size - 20) + 10;
      const duration = Math.random() * 1300 + 2900;

      el.style.left = `${x}px`;
      el.style.top = `-90px`;
      document.body.appendChild(el);

      const start = performance.now();

      function fall(now) {
        if (!gameActive || !el.isConnected) return;

        const progress = (now - start) / duration;
        el.style.top = `${-90 + progress * (window.innerHeight + 140)}px`;

        if (progress >= 1) {
          el.remove();
          return;
        }

        requestAnimationFrame(fall);
      }

      requestAnimationFrame(fall);

      el.addEventListener("pointerdown", () => pickItem(item, el));
    }

    function pickItem(item, el) {
      if (!gameActive) return;

      el.remove();

      const expected = correctOrder[currentIndex];

      if (expected && item.id === expected.id) {
        score += 100;
        scoreEl.textContent = score;

        const part = document.getElementById(item.part);
        part.classList.add("show");

        currentIndex++;
        renderOrder();

        if (currentIndex >= correctOrder.length) {
          score += time * 10;
          scoreEl.textContent = score;
          showMessage("パーフェクトパフェ！");
          setTimeout(endGame, 500);
        } else {
          showMessage(`次は${correctOrder[currentIndex].label}`);
        }
      } else {
        badCount++;
        score = Math.max(0, score - 60);
        scoreEl.textContent = score;

        badTextEl.textContent = item.emoji;
        document.getElementById("part-bad").classList.add("show");
        setTimeout(() => {
          document.getElementById("part-bad").classList.remove("show");
        }, 450);

        if (badItems.some(x => x.id === item.id)) {
          showMessage(`${item.label}はパフェじゃない`);
        } else if (expected) {
          showMessage(`まだ${expected.label}`);
        } else {
          showMessage("もう完成している");
        }
      }
    }

    function showMessage(text) {
      clearTimeout(messageTimer);
      messageEl.textContent = text;
      messageEl.classList.add("show");

      messageTimer = setTimeout(hideMessage, 1100);
    }

    function hideMessage() {
      messageEl.classList.remove("show");
    }

    function endGame() {
      if (!gameActive) return;

      gameActive = false;
      clearInterval(spawnTimer);
      clearInterval(countdownTimer);
      document.querySelectorAll(".falling").forEach(el => el.remove());

      const completed = currentIndex >= correctOrder.length;

      if (completed && badCount === 0) {
        resultTitleEl.textContent = "完全試合パフェ";
        resultTextEl.innerHTML = `ノーミスで完成。<br>これはもう完全試合です。<br>SCORE：${score}`;
      } else if (completed) {
        resultTitleEl.textContent = "完成パフェ";
        resultTextEl.innerHTML = `完成はした。<br>でも途中で変なものを入れかけました。<br>SCORE：${score}`;
      } else if (currentIndex >= 3) {
        resultTitleEl.textContent = "ほぼパフェ";
        resultTextEl.innerHTML = `方向性はパフェ。<br>完成度はまだファミレス手前です。<br>SCORE：${score}`;
      } else {
        resultTitleEl.textContent = "何かの供養";
        resultTextEl.innerHTML = `パフェではなく、何かの供養です。<br>SCORE：${score}`;
      }

      miniResultEl.innerHTML = document.querySelector(".parfaitWrap").innerHTML;
      resultScreen.classList.add("active");
    }

    startBtn.addEventListener("click", startGame);
    retryBtn.addEventListener("click", startGame);
  </script>
</body>
</html>
