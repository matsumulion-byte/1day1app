<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>ハロワ松村</title>
  <link rel="stylesheet" href="/apps/2026-04-17/style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <p class="badge">4/17 ハロワの日</p>
      <h1>ハロワ松村</h1>
      <p class="subtitle">あなたに向いている“何か”を雑に案内します</p>
    </header>

    <main class="card">
      <section id="start-screen" class="screen active">
        <div class="start-visual-wrap">
          <img
            id="start-visual"
            class="start-visual"
            src=""
            alt="ハロワ松村"
          />
        </div>

        <div class="hero">
          <p class="hero-lead">適職診断</p>
          <p class="hero-copy">
            いくつかの質問に答えると、
            ハロワ松村があなたの今後を勝手に決めます。
          </p>
        </div>

        <button id="start-btn" class="primary-btn">診断スタート</button>
      </section>

      <section id="quiz-screen" class="screen">
        <div class="progress-wrap">
          <div class="progress-meta">
            <span id="question-count">1 / 5</span>
            <span id="question-category">質問</span>
          </div>
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
        </div>

        <div class="question-wrap">
          <h2 id="question-text" class="question-text"></h2>
          <div id="choices" class="choices"></div>
        </div>
      </section>

      <section id="result-screen" class="screen">
        <p class="result-label">あなたの適職は</p>
        <h2 id="result-title" class="result-title"></h2>
        <p id="result-desc" class="result-desc"></p>

        <div class="result-actions">
          <button id="retry-btn" class="primary-btn">もう一度やる</button>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/apps/2026-04-17/main.js"></script>
</body>
</html>
